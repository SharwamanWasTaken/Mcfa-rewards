<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | MCFA Rewards</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body>

<header>
    <div class="logo">🎁 MCFA Rewards</div>
</header>

<section class="hero">
    <div class="login-card">
        <h2 id="form-title">Create Account</h2>
        <p class="small-text" id="form-subtitle">Create your account to start claiming exclusive rewards.</p>

        <div id="error-msg" style="color:#ff4d4d;margin-bottom:12px;display:none;font-size:14px;"></div>
        <div id="success-msg" style="color:#4ade80;margin-bottom:12px;display:none;font-size:14px;"></div>

        <!-- Step 1: Register -->
        <form id="register-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <input type="password" id="confirm-password" placeholder="Confirm Password" required>
            <button type="submit" id="register-btn">Create Account</button>
        </form>

        <!-- Step 2: Verify OTP (hidden initially) -->
        <form id="verify-form" style="display:none;">
            <input type="text" id="otp-input" placeholder="Enter 6-digit code" maxlength="6" required style="letter-spacing:4px;text-align:center;font-size:20px;">
            <button type="submit" id="verify-btn">Verify Email</button>
        </form>

        <div id="resend-section" style="display:none;margin-top:10px;">
            <p class="small-text" id="resend-text">Didn't get the code? <a href="#" onclick="resendCode()" style="color:#7c3aed;">Resend</a></p>
        </div>

        <div class="divider"><span>Already have an account?</span></div>
        <a href="index.html" class="register-btn">Login</a>
    </div>
</section>

<footer>© 2026 MCFA Rewards • All Rights Reserved</footer>

<script>
emailjs.init('ZvhLoZ0XNkUL5BRbA');

const SERVICE_ID = 'service_md2q7zi';
const TEMPLATE_ID = 'template_960qw44';

let pendingEmail = '';
let pendingUser = {};
let generatedOTP = '';

function generateOTP() {
    return Math.floor(100000 + Math.random() * 900000).toString();
}

async function sendOTP(email, otp) {
    await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
        email: email,
        passcode: otp,
        to_name: pendingUser.username,
    });
}

document.getElementById('register-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm-password').value;
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    const btn = document.getElementById('register-btn');

    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    if (username.length < 3) {
        errorMsg.textContent = '❌ Username must be at least 3 characters.';
        errorMsg.style.display = 'block';
        return;
    }
    if (password.length < 6) {
        errorMsg.textContent = '❌ Password must be at least 6 characters.';
        errorMsg.style.display = 'block';
        return;
    }
    if (password !== confirm) {
        errorMsg.textContent = '❌ Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
    }

    const users = JSON.parse(localStorage.getItem('mcfa_users') || '{}');
    if (users[email]) {
        errorMsg.textContent = '❌ An account with this email already exists.';
        errorMsg.style.display = 'block';
        return;
    }

    btn.textContent = 'Sending code...';
    btn.disabled = true;

    try {
        generatedOTP = generateOTP();
        pendingEmail = email;
        pendingUser = { username, password };

        await sendOTP(email, generatedOTP);

        // Show OTP form
        document.getElementById('register-form').style.display = 'none';
        document.getElementById('verify-form').style.display = 'block';
        document.getElementById('resend-section').style.display = 'block';
        document.getElementById('form-title').textContent = 'Verify Your Email';
        document.getElementById('form-subtitle').textContent = `We sent a 6-digit code to ${email}`;
        successMsg.textContent = '✅ Verification code sent! Check your email.';
        successMsg.style.display = 'block';

    } catch (err) {
        errorMsg.textContent = '❌ Failed to send email. Please check your email address and try again.';
        errorMsg.style.display = 'block';
        btn.textContent = 'Create Account';
        btn.disabled = false;
    }
});

document.getElementById('verify-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const otp = document.getElementById('otp-input').value.trim();
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');

    errorMsg.style.display = 'none';

    if (otp !== generatedOTP) {
        errorMsg.textContent = '❌ Incorrect code. Please try again.';
        errorMsg.style.display = 'block';
        return;
    }

    // Save verified user
    const users = JSON.parse(localStorage.getItem('mcfa_users') || '{}');
    users[pendingEmail] = {
        username: pendingUser.username,
        password: pendingUser.password,
        verified: true,
        createdAt: Date.now()
    };
    localStorage.setItem('mcfa_users', JSON.stringify(users));

    successMsg.textContent = '✅ Email verified! Redirecting to login...';
    successMsg.style.display = 'block';
    document.getElementById('verify-form').style.display = 'none';
    document.getElementById('resend-section').style.display = 'none';

    setTimeout(() => window.location.href = 'index.html', 2000);
});

async function resendCode() {
    const errorMsg = document.getElementById('error-msg');
    const successMsg = document.getElementById('success-msg');
    errorMsg.style.display = 'none';
    try {
        generatedOTP = generateOTP();
        await sendOTP(pendingEmail, generatedOTP);
        successMsg.textContent = '✅ New code sent!';
        successMsg.style.display = 'block';
    } catch(err) {
        errorMsg.textContent = '❌ Failed to resend. Try again.';
        errorMsg.style.display = 'block';
    }
}
</script>
</body>
</html>
