<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Reward | MCFA Rewards</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">🎁 MCFA Rewards</div>
    <a href="dashboard.html" class="admin-btn">← Back</a>
</header>

<section class="hero">
    <div class="login-card">
        <h2>Claim Your Reward</h2>
        <p class="small-text">Select your reward and enter your reward code.</p>

        <div id="error-msg" style="color:#ff4d4d;margin-bottom:12px;display:none;font-size:14px;"></div>

        <form id="claim-form">
            <select id="reward" required class="select-box">
                <option value="">Select Reward</option>
                <option>MCFA Permanent</option>
                <option>Minecraft Redeem Code</option>
                <option>Roblox $50 Gift Card</option>
                <option>Roblox $100 Gift Card</option>
                <option>Nitro Basic Yearly</option>
                <option>Nitro Boost Yearly</option>
            </select>
            <input type="text" id="code" placeholder="Enter Reward Code" required>
            <button type="submit">Claim Reward</button>
        </form>

        <p class="small-text">⚠️ Reward codes can only be used once.</p>
    </div>
</section>

<footer>© 2026 MCFA Rewards • All Rights Reserved</footer>

<script>
// Block access if not logged in
if (localStorage.getItem('mcfa_logged_in') !== 'true') {
    window.location.href = 'index.html';
}

document.getElementById('claim-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const reward = document.getElementById('reward').value;
    const code = document.getElementById('code').value.trim();
    const errorMsg = document.getElementById('error-msg');

    if (!reward) {
        errorMsg.textContent = '❌ Please select a reward.';
        errorMsg.style.display = 'block';
        return;
    }
    if (!code) {
        errorMsg.textContent = '❌ Please enter your reward code.';
        errorMsg.style.display = 'block';
        return;
    }

    // Check if code has already been used
    const usedCodes = JSON.parse(localStorage.getItem('mcfa_used_codes') || '[]');
    if (usedCodes.includes(code)) {
        errorMsg.textContent = '❌ This code has already been used.';
        errorMsg.style.display = 'block';
        return;
    }

    // Mark code as used
    usedCodes.push(code);
    localStorage.setItem('mcfa_used_codes', JSON.stringify(usedCodes));

    // Save claim
    const email = localStorage.getItem('mcfa_current_user');
    const claims = JSON.parse(localStorage.getItem('mcfa_claims') || '[]');
    claims.push({ email, reward, code, claimedAt: Date.now() });
    localStorage.setItem('mcfa_claims', JSON.stringify(claims));

    window.location.href = 'success.html';
});
</script>
</body>
</html>
